name: CD Pipeline - Livraison DockerHub

on:
  workflow_run:
    workflows: ["CI Pipeline - Toolbox V2"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push:
    # On vérifie de manière stricte que le pipeline précédent est "success" et non "failed"
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push - API
        uses: docker/build-push-action@v5
        with:
          context: ./app_api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/toolbox-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/toolbox-api:${{ github.sha }}

      - name: Build et Push - Front
        uses: docker/build-push-action@v5
        with:
          context: ./app_front
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/toolbox-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/toolbox-front:${{ github.sha }}