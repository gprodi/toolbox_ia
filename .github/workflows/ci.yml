name: CI Pipeline - Toolbox V2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 1. AUTORISATIONS CRITIQUES : Nécessaires pour le déploiement direct
permissions:
  contents: read      # Lire le code
  pages: write         # Autorisation d'écrire sur Pages
  id-token: write      # Authentification sécurisée vers GitHub Pages

# Empêche plusieurs déploiements simultanés de s'écraser
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # --- JOB 1 : SÉCURITÉ (Identique) ---
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- JOB 2 : TESTS API (Identique) ---
  test-api:
    runs-on: ubuntu-latest
    needs: security
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - working-directory: ./app_api
        run: uv sync --all-groups
      - working-directory: ./app_api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: uv run pytest ../tests/test_api.py

  # --- JOB 3 : CONSTRUCTION & DÉPLOIEMENT DOCS (MODERNISÉ) ---
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test-api
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Installation uv
        uses: astral-sh/setup-uv@v5
        
      - name: Build Documentation HTML
        run: |
          # Installation et construction
          uv sync --project app_api --group dev
          uv run --project app_api sphinx-build -b html docs docs/_build/html
          
      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload de l'Artéfact (La boîte scellée)
        uses: actions/upload-pages-artifact@v3
        with:
          # On prend le dossier HTML généré précédemment
          path: './docs/_build/html'

      - name: Déploiement Direct (Vers la vitrine)
        id: deployment
        uses: actions/deploy-pages@v4