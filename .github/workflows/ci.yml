name: CI Pipeline - Toolbox V2

# Se déclenche à chaque push sur la branche principale et sur notre branche de travail
on:
  push:
    branches: [ "main", "v2-microservices" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Job de Sécurité : Vérification des fuites de secrets
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour que Gitleaks scanne tout l'historique
          
      - name: Analyse Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Job de Tests : Validation de l'API
  test-api:
    runs-on: ubuntu-latest
    needs: security # On ne lance les tests que si le code est sécurisé !
    
    # On déploie une base PostgreSQL éphémère directement dans les serveurs GitHub
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        
      - name: Installation de 'uv'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "app_api/pyproject.toml"
          
      - name: Installation des dépendances (y compris dev)
        working-directory: ./app_api
        run: uv sync --all-groups
        
      - name: Exécution des tests Pytest
        working-directory: ./app_api
        env:
          # On donne à l'API l'adresse de la BDD éphémère montée par GitHub
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: uv run pytest ../tests/test_api.py