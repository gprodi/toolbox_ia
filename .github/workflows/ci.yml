name: CI Pipeline - Toolbox V2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 1. AUTORISATIONS CRITIQUES : Nécessaires pour le déploiement direct (sans branche gh-pages)
permissions:
  contents: read
  pages: write
  id-token: write

# Empêche plusieurs déploiements simultanés de s'écraser
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ==========================================
  # JOB 1 : VÉRIFICATION DE SÉCURITÉ
  # ==========================================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # JOB 2 : TESTS ET COUVERTURE (GENBADGE)
  # ==========================================
  test-api:
    runs-on: ubuntu-latest
    needs: security
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      
      - name: Tests Pytest et Création du Badge
        working-directory: ./app_api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          uv sync --all-groups
          # On crée le rapport XML de couverture
          uv run pytest --cov=. --cov-report=xml ../tests/test_api.py
          # Genbadge transforme le XML en image SVG
          uv run genbadge coverage -i coverage.xml -o coverage.svg

      - name: Mise en soute du Badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: app_api/coverage.svg # On sauvegarde l'image pour l'étape suivante

  # ==========================================
  # JOB 3 : BUILD DE LA DOC ET DÉPLOIEMENT
  # ==========================================
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test-api
    # On déploie uniquement si c'est un push sur la branche principale
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        
      - name: Build Documentation HTML (Sphinx)
        run: |
          uv sync --project app_api --group dev
          uv run --project app_api sphinx-build -b html docs docs/_build/html

      - name: Injection du Badge dans le site web
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          # MAGIE : On dépose le SVG directement à la racine du futur site
          path: docs/_build/html/

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparation de l'Artéfact web (ZIP)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/_build/html'

      - name: Déploiement Direct (Vers la vitrine)
        id: deployment
        uses: actions/deploy-pages@v4