name: CI & Documentation Deployment

on:
  push:
    branches: [ "main" ]

# Autorisations nécessaires pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  audit-et-tests:
    runs-on: ubuntu-latest
    # NOUVEAU : Mise en place d'une matrice stratégique
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠️ Installation de Python et uv
        uses: astral-sh/setup-uv@v5
        with:
          # NOUVEAU : On utilise la variable de la matrice au lieu d'une valeur en dur
          python-version: ${{ matrix.python-version }}
      - name: 📦 Installation des dépendances
        # NOUVEAU : On utilise la variable de la matrice
        run: uv sync --python ${{ matrix.python-version }}

      - name: 🔍 Linting (Ruff)
        run: uv run ruff check .

      - name: 🧪 Tests unitaires (Pytest)
        run: uv run pytest

      - name: 📚 Génération de la Doc (Sphinx)
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: 📤 Upload de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  