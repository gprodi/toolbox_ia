name: CI & Documentation Deployment

on:
  push:
    branches: [ "main" ]

# Autorisations nécessaires pour GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  audit-et-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠️ Installation de Python et uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: 📦 Installation des dépendances
        run: uv sync --python 3.12

      - name: 🔍 Linting (Ruff)
        run: uv run ruff check .

      - name: 🧪 Tests unitaires (Pytest)
        run: uv run pytest

      - name: 📚 Génération de la Doc (Sphinx)
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: 📤 Upload de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  