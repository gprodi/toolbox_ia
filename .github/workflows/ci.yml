name: CI Pipeline - Toolbox V2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # JOB 1 BIS : LINTING ET FORMATAGE (RUFF)
  # ==========================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Vérification du code de l'API avec Ruff
        working-directory: ./app_api
        run: |
          uv sync --group dev
          # 1. Vérifie la syntaxe, les variables non utilisées, les imports mal triés
          uv run ruff check .
          # 2. Vérifie que le code est bien formaté (sans modifier les fichiers, sinon la CI passe alors que le code original est sale)
          uv run ruff format --check .

      - name: Vérification du code du Front avec Ruff
        working-directory: ./app_front
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .        
  test-api:
    runs-on: ubuntu-latest
    needs: [security, lint]
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      
      - name: Tests Pytest et Création du Badge
        working-directory: ./app_api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          uv sync --all-groups
          uv run pytest --cov=. --cov-report=xml ../tests/test_api.py
          uv run genbadge coverage -i coverage.xml -o coverage.svg

      - name: Mise en soute du Badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: app_api/coverage.svg

  test-front:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      
      - name: Smoke Test - Démarrage de Streamlit
        working-directory: ./app_front
        run: |
          uv sync --group dev
          # On simule un démarrage de l'interface en tâche de fond
          uv run streamlit run main.py --server.headless=true &
          PID=$!
          sleep 5
          if ps -p $PID > /dev/null; then
             echo "Le Front a démarré avec succès !"
             kill $PID
          else
             echo "Erreur fatale : Le Front a crashé au démarrage."
             exit 1
          fi
                  
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [test-api, test-front]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        
      - name: Build Documentation HTML (Sphinx)
        run: |
          uv sync --project app_api --group dev
          uv run --project app_api sphinx-build -b html docs docs/_build/html

      - name: Injection du Badge dans le site web
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: docs/_build/html/

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparation de l'Artéfact web (ZIP)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/_build/html'

      - name: Déploiement Direct (Vers la vitrine)
        id: deployment
        uses: actions/deploy-pages@v4

  changelog:
    runs-on: ubuntu-latest
    needs: deploy-docs
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Récupération du code (Historique complet requis)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Génération du Changelog avec git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit automatique du fichier
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): auto-update changelog [skip ci]"
          file_pattern: CHANGELOG.md