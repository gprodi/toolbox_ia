name: CI Pipeline - Toolbox V2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Analyse Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-api:
    runs-on: ubuntu-latest
    needs: security
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Installation uv
        uses: astral-sh/setup-uv@v5
      - name: Installation dépendances
        working-directory: ./app_api
        run: uv sync --all-groups
      - name: Run Pytest
        working-directory: ./app_api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: uv run pytest ../tests/test_api.py

  deploy-docs:
    runs-on: ubuntu-latest
    needs: test-api
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Installation uv
        uses: astral-sh/setup-uv@v5
        
      - name: Installation Sphinx et dépendances
        working-directory: ./app_api
        run: uv sync --all-groups
        
      - name: Build Documentation HTML
        run: |
          # On appelle sphinx-build directement.
          # -b html : format de sortie
          # docs : dossier source
          # docs/_build/html : dossier de destination
          uv run --project app_api sphinx-build -b html docs docs/_build/html
          
      - name: Déploiement sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html