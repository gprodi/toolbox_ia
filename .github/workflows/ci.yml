name: CI & Documentation Deployment

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ==========================================
  # JOB 1 : TESTS ET QUALITÉ
  # ==========================================
  audit-et-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠️ Installation de Python et uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Installation des dépendances
        run: uv sync --python ${{ matrix.python-version }}

      - name: 🔍 Linting (Ruff)
        run: uv run ruff check .

      - name: 🧪 Tests unitaires et génération du badge
        run: |
          uv run pytest
          uv run coverage xml
          uv run genbadge coverage -i coverage.xml -o coverage.svg

      - name: 📤 Sauvegarde du badge (Artefact)
        # NOUVEAU : On utilise la version de Python dans le nom pour éviter les conflits (ex: coverage-badge-3.12)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge-${{ matrix.python-version }}
          path: coverage.svg
          include-hidden-files: true
          if-no-files-found: error

  # ==========================================
  # JOB 2 : DOCUMENTATION
  # ==========================================
  build-docs:
    needs: audit-et-tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠️ Installation de Python et uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: 📦 Installation des dépendances
        run: uv sync --python 3.12

      - name: 📚 Génération de la Doc (Sphinx)
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: 📥 Injection du badge dans le site web
        uses: actions/download-artifact@v4
        with:
          # NOUVEAU : On télécharge spécifiquement l'artefact généré par la version 3.12
          name: coverage-badge-3.12
          path: docs/_build/html/

      - name: 📤 Upload de l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html